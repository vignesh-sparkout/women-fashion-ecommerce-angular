<section class="admin-panel">
  <aside class="admin-sidebar">
    <nav aria-label="Admin navigation">
      <a routerLink="/admin/dashboard" routerLinkActive="active">
        <span class="nav-icon">D</span>
        Dashboard
      </a>
      <a routerLink="/admin/products" routerLinkActive="active">
        <span class="nav-icon">P</span>
        Products
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active">
        <span class="nav-icon">O</span>
        Orders
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active">
        <span class="nav-icon">C</span>
        Categories
      </a>
    </nav>

    <div class="sidebar-visual">
      <img src="/ChatGPT Image Jun 9, 2026, 02_40_05 PM.png" alt="" />
    </div>

    <button type="button" class="logout-button" (click)="signOut()">
      <span>Logout</span>

  <div class="admin-content">
    <router-outlet />
  </div>
</section>
