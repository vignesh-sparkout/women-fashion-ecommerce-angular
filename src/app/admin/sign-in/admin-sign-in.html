<section class="auth-shell">
  @if (popupMessage) {
    <div class="auth-popup-backdrop" aria-live="polite">
      <div class="auth-popup" [class.error]="popupType === 'error'">
        <span class="auth-popup-mark">{{ popupType === 'success' ? 'OK' : '!' }}</span>
        <div>
          <strong>{{ popupTitle }}</strong>
          <p>{{ popupMessage }}</p>
        </div>
      </div>
    </div>
  }

  <form [formGroup]="adminForm" (ngSubmit)="signIn()" class="auth-card admin-auth-card" novalidate>
    <div class="auth-topbar">
      <div class="auth-brand">
        <span class="brand-mark">V</span>
        <span>Velora</span>
      </div>
    </div>

    <p class="eyebrow">Admin Panel</p>

    <div class="auth-heading">
      <h1>Admin Sign In</h1>
    </div>

    <div class="field-group">
      <label for="adminEmail">Admin email</label>
      <input
        id="adminEmail"
        type="email"
        formControlName="email"
        autocomplete="username"
        placeholder="name@gmail.com"
        [class.invalid]="emailInvalid()"
      />
      @if (emailError(); as error) {
        <p class="field-error">{{ error }}</p>
      }
    </div>

    <div class="field-group">
      <label for="adminPassword">Password</label>
      <input
        id="adminPassword"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="Enter password"
        [class.invalid]="passwordInvalid()"
      />
      @if (passwordError(); as error) {
        <p class="field-error">{{ error }}</p>
      }
    </div>

    <button type="submit" class="button primary auth-submit">Sign In</button>

    <div class="auth-links">
      <a routerLink="/">Back to home</a>
    </div>
  </form>
</section>
