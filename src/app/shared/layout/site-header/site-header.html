<header class="site-header">
  <a routerLink="/" class="brand" aria-label="Velora home">
    <span class="brand-mark">V</span>
    <span>Velora</span>
  </a>

  <nav class="primary-nav" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/categories" routerLinkActive="active">Categories</a>
    <a routerLink="/products" routerLinkActive="active">Products</a>

    @if (adminAuth.isAdminSignedIn()) {
      <a routerLink="/admin/dashboard" routerLinkActive="active">Admin</a>
      <button type="button" class="nav-button" (click)="adminSignOut()">Log Out</button>
    } @else if (auth.isSignedIn()) {
      <a routerLink="/orders" routerLinkActive="active">Orders</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
      <button type="button" class="nav-button" (click)="userSignOut()">Log Out</button>
    } @else {
      <a routerLink="/auth" routerLinkActive="active">Sign In</a>
      <a routerLink="/admin/dashboard" routerLinkActive="active">Admin</a>
    }
  </nav>

  @if (auth.isSignedIn()) {
    <div class="header-actions">
      <a routerLink="/wishlist" class="icon-link" aria-label="Liked products">
        Liked
        <span>{{ shop.wishlistCount() }}</span>
      </a>
      <a routerLink="/cart" class="icon-link" aria-label="Cart">
        Cart
        <span>{{ shop.cartCount() }}</span>
      </a>
    </div>
  }
</header>
