<section class="auth-shell">
  @if (popupMessage) {
    <div class="auth-popup-backdrop" aria-live="polite">
      <div class="auth-popup" [class.error]="popupType === 'error'">
        <span class="auth-popup-mark">{{ popupType === 'success' ? 'OK' : '!' }}</span>
        <div>
          <strong>{{ popupTitle }}</strong>
          <p>{{ popupMessage }}</p>
        </div>
      </div>
    </div>
  }

  <form [formGroup]="loginForm" (ngSubmit)="signIn()" class="auth-card" novalidate>
    <div class="auth-topbar">
      <div class="auth-brand">
        <span class="brand-mark">V</span>
        <span>Velora</span>
      </div>
    </div>

    <p class="eyebrow">User Sign In</p>

    <div class="auth-heading">
      <h1>Welcome back</h1>
    </div>

    <div class="field-group">
      <label for="loginEmail">Email address</label>
      <input
        id="loginEmail"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="name@gmail.com"
        [class.invalid]="emailInvalid()"
      />
      @if (emailError(); as error) {
        <p class="field-error">{{ error }}</p>
      }
    </div>

    <div class="field-group">
      <label for="loginPassword">Password</label>
      <input
        id="loginPassword"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="Enter password"
        [class.invalid]="passwordInvalid()"
      />
      @if (passwordError(); as error) {
        <p class="field-error">{{ error }}</p>
      }
    </div>

    <button type="submit" class="button primary auth-submit">Sign in</button>

    <div class="auth-links">
      <a routerLink="/register" [queryParams]="{ returnUrl: returnUrl }">Create account</a>
      <a routerLink="/">Back to home</a>
    </div>
  </form>
</section>
